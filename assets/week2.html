# Sentinel-2 for Urban Remote Sensing

CASA0023 Remotely Sensing Cities and Environments  
UCL Bartlett Centre for Advanced Spatial Analysis

---

# What is Sentinel-2?

Sentinel-2 is part of the **Copernicus Earth Observation Programme** developed by the European Space Agency (ESA).

Key characteristics:

* Multispectral satellite imagery
* Global land monitoring mission
* Free and open data access
* Designed for environmental and urban applications

Earth observation data such as Sentinel-2 enable consistent monitoring of cities and landscapes.

---

# Mission Overview

.pull-left[

Two satellites:

* Sentinel-2A (2015)  
* Sentinel-2B (2017)

Together they provide:

* **5 day revisit time**
* Global coverage
* Continuous monitoring

]

.pull-right[

Satellite imagery provides a unique perspective on urban environments.

Compared with ground surveys, satellite data allow researchers to observe large spatial areas consistently over time.

]

---

# Spectral Information

Sentinel-2 collects data across **13 spectral bands**.

Important bands for urban analysis:

| Band | Wavelength | Application |
|-----|------------|------------|
| B02 | Blue | water &amp; atmosphere |
| B03 | Green | vegetation |
| B04 | Red | vegetation absorption |
| B08 | Near Infrared | vegetation reflectance |

Different surfaces reflect electromagnetic radiation differently, which allows them to be distinguished in satellite imagery.

---

# Spatial Resolution

Sentinel-2 imagery is available at three spatial resolutions:

| Resolution | Bands |
|------------|------|
| 10 m | B02 B03 B04 B08 |
| 20 m | vegetation &amp; SWIR bands |
| 60 m | atmospheric bands |

The **10 m resolution** makes Sentinel-2 particularly useful for analysing urban environments.

It allows large features such as parks, rivers and built-up areas to be clearly identified.

---

# Urban Remote Sensing

Sentinel-2 data are widely used in urban research.

Examples include:

* mapping urban expansion
* monitoring green infrastructure
* analysing land cover change
* assessing environmental sustainability

These applications are important for supporting data-driven urban planning.

---

# Example: London

Sentinel-2 imagery can clearly reveal the structure of cities.

Features visible in London imagery include:

* the River Thames
* large urban parks
* dense built-up areas
* transport corridors

Combining spectral bands allows vegetation and built environments to be distinguished more easily.

---

# Why Earth Observation Matters

Earth observation provides an important data source for cities.

Benefits include:

* large scale spatial coverage
* consistent data collection
* long-term monitoring

However, satellite imagery also has limitations, including cloud cover and spatial resolution constraints.

Understanding these strengths and limitations is important when using EO data for urban research.

---

# Reflection

Exploring Sentinel-2 data helped me understand how satellite imagery can support urban environmental analysis.

Multispectral data allow researchers to identify patterns that may not be visible using traditional mapping methods.

In the future, Earth observation data are likely to play an increasingly important role in monitoring urban sustainability and environmental change.

---

# References

Jensen, J. R. (2015). *Introductory Digital Image Processing.*

Tempfli, K. et al. (2009). *Principles of Remote Sensing.*
